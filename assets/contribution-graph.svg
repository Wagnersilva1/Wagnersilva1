        <path d="M 24 0 L 0 0 0 20" fill="none" stroke="#0f7a3f" stroke-opacity=".22" stroke-width="1"/>
      </pattern>
      <pattern id="majorGrid" width="120" height="40" patternUnits="userSpaceOnUse">
        <rect width="120" height="40" fill="url(#minorGrid)"/>
        <path d="M 120 0 L 0 0 0 40" fill="none" stroke="#13b35e" stroke-opacity=".28" stroke-width="1"/>
      </pattern>
      <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="2.4" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>


<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg-grid { stroke: #1f6feb; stroke-opacity: .18; }
    .glow { filter: drop-shadow(0 0 18px rgba(0, 212, 255, .65)); }
    .name-a { animation: flipA 6s ease-in-out infinite; transform-origin: 610px 148px; }
    .name-b { animation: flipB 6s ease-in-out infinite; transform-origin: 610px 148px; }
    .avatar { animation: float 4.5s ease-in-out infinite; transform-origin: 210px 180px; }
    .blade { animation: pulse 2.4s ease-in-out infinite; }
    .scan { animation: scan 3.6s linear infinite; }
    @keyframes flipA {
      0%, 38% { opacity: 1; transform: rotateX(0deg); }
      48%, 88% { opacity: 0; transform: rotateX(90deg); }
      100% { opacity: 1; transform: rotateX(0deg); }
    }
    @keyframes flipB {
      0%, 42% { opacity: 0; transform: rotateX(-90deg); }
      52%, 86% { opacity: 1; transform: rotateX(0deg); }
      100% { opacity: 0; transform: rotateX(-90deg); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: .45; }
      50% { opacity: 1; }
    }
    @keyframes scan {
      0% { transform: translateX(-460px); opacity: 0; }
      20%, 75% { opacity: .85; }
      100% { transform: translateX(1240px); opacity: 0; }
    }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset=".48" stop-color="#071B33"/>
      <stop offset="1" stop-color="#02040A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#58A6FF"/>
    </linearGradient>
    <radialGradient id="orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 170) rotate(90) scale(155)">
      <stop stop-color="#00D4FF" stop-opacity=".22"/>
      <stop offset="1" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="210" cy="180" r="96"/>
    </clipPath>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <path d="M0 310C170 250 250 330 410 282C585 230 710 260 860 292C1015 325 1102 288 1200 248V360H0V310Z" fill="#0969DA" opacity=".12"/>
  <path class="bg-grid" d="M80 54H1120M80 104H1120M80 154H1120M80 204H1120M80 254H1120M80 304H1120M120 32V328M220 32V328M320 32V328M420 32V328M520 32V328M620 32V328M720 32V328M820 32V328M920 32V328M1020 32V328M1120 32V328"/>
  <rect class="scan" x="0" y="0" width="180" height="360" fill="url(#accent)" opacity=".08"/>

  <g class="avatar">
    <circle cx="210" cy="180" r="132" fill="url(#orb)"/>
    <circle cx="210" cy="180" r="104" fill="#0D1117" stroke="#30363D" stroke-width="3"/>
    <g clip-path="url(#circle)">
      <rect x="110" y="80" width="200" height="200" fill="#0B1220"/>
      <path d="M120 255C138 203 170 178 211 178C252 178 284 203 302 255V280H120V255Z" fill="#161B22"/>
      <path d="M145 166C154 113 180 88 221 92C261 96 284 125 288 170C251 154 201 148 145 166Z" fill="#D8DEE9"/>
      <path d="M142 164C190 144 239 145 287 164L275 193C232 181 190 181 153 194L142 164Z" fill="#C9D1D9"/>
      <rect x="144" y="151" width="134" height="34" rx="9" fill="#1F6FEB"/>
      <rect x="157" y="160" width="108" height="16" rx="8" fill="#0D1117"/>
      <path d="M169 207C194 222 228 223 255 207V270H169V207Z" fill="#0D1117"/>
      <path d="M178 212C204 224 224 224 248 212" stroke="#58A6FF" stroke-width="5" stroke-linecap="round"/>
      <path class="blade" d="M208 105L222 178L199 230L211 166L198 116L208 105Z" fill="#E6EDF3"/>
      <path d="M174 174L201 159M247 159L274 174" stroke="#00D4FF" stroke-width="5" stroke-linecap="round"/>
    </g>
    <circle cx="210" cy="180" r="104" fill="none" stroke="url(#accent)" stroke-width="2" opacity=".75"/>
  </g>

  <g class="glow">
    <text class="name-a" x="390" y="143" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">Wagner Silva</text>
    <text class="name-b" x="390" y="143" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">Sr. Kakashi</text>
  </g>
  <text x="392" y="190" fill="#8B949E" font-family="Consolas, monospace" font-size="23" font-weight="600">JavaScript Developer | FiveM vRP | Discord Bots | APIs</text>
  <text x="392" y="230" fill="#58A6FF" font-family="Consolas, monospace" font-size="20">building scalable systems, automations and clean interfaces</text>

  <rect x="390" y="260" width="120" height="34" rx="17" fill="#111827" stroke="#30363D"/>
  <text x="420" y="282" fill="#F7DF1E" font-family="Consolas, monospace" font-size="15" font-weight="700">JS</text>
  <rect x="526" y="260" width="130" height="34" rx="17" fill="#111827" stroke="#30363D"/>
  <text x="555" y="282" fill="#5FA04E" font-family="Consolas, monospace" font-size="15" font-weight="700">Node.js</text>
  <rect x="672" y="260" width="112" height="34" rx="17" fill="#111827" stroke="#30363D"/>
  <text x="706" y="282" fill="#00D4FF" font-family="Consolas, monospace" font-size="15" font-weight="700">vRP</text>
  <rect x="800" y="260" width="156" height="34" rx="17" fill="#111827" stroke="#30363D"/>
  <text x="830" y="282" fill="#58A6FF" font-family="Consolas, monospace" font-size="15" font-weight="700">Automation</text>
</svg>

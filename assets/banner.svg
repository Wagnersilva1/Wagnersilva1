<svg width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .name-wagner {
      animation: wagnerIn 7s cubic-bezier(.22,1,.36,1) infinite;
      transform-origin: 300px 225px;
    }
    .name-kakashi {
      animation: kakashiIn 7s cubic-bezier(.22,1,.36,1) infinite;
      transform-origin: 300px 225px;
    }
    .scan {
      animation: scan 3.2s linear infinite;
    }
    .pulse {
      animation: pulse 2.4s ease-in-out infinite;
    }
    .line-a {
      animation: lineMove 6s linear infinite;
    }
    .line-b {
      animation: lineMove 8s linear infinite reverse;
    }
    .photo {
      animation: photoPulse 7s ease-in-out infinite;
      transform-origin: 1065px 250px;
    }
    @keyframes wagnerIn {
      0% { opacity: 0; transform: translateX(-70px) skewX(-12deg); filter: blur(6px); }
      8%, 38% { opacity: 1; transform: translateX(0) skewX(0); filter: blur(0); }
      48%, 100% { opacity: 0; transform: translateX(55px) skewX(10deg); filter: blur(7px); }
    }
    @keyframes kakashiIn {
      0%, 44% { opacity: 0; transform: translateY(38px) scale(.94); filter: blur(8px); }
      52%, 86% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      96%, 100% { opacity: 0; transform: translateY(-28px) scale(.98); filter: blur(6px); }
    }
    @keyframes scan {
      0% { transform: translateX(-340px); opacity: 0; }
      18%, 70% { opacity: .9; }
      100% { transform: translateX(1540px); opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: .55; }
      50% { opacity: 1; }
    }
    @keyframes lineMove {
      0% { transform: translateX(-240px); }
      100% { transform: translateX(240px); }
    }
    @keyframes photoPulse {
      0%, 100% { transform: scale(1); filter: saturate(1.08) contrast(1.06); }
      50% { transform: scale(1.025); filter: saturate(1.25) contrast(1.12); }
    }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050000"/>
      <stop offset=".38" stop-color="#4A0000"/>
      <stop offset=".72" stop-color="#E00000"/>
      <stop offset="1" stop-color="#130000"/>
    </linearGradient>
    <linearGradient id="darkFade" x1="0" y1="0" x2="1500" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#000000" stop-opacity=".72"/>
      <stop offset=".47" stop-color="#000000" stop-opacity=".28"/>
      <stop offset=".72" stop-color="#000000" stop-opacity=".04"/>
      <stop offset="1" stop-color="#000000" stop-opacity=".76"/>
    </linearGradient>
    <linearGradient id="whiteSlash" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FFFFFF"/>
      <stop offset=".88" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="rightPhoto">
      <path d="M780 0H1500V500H690C760 412 795 322 790 230C786 144 750 70 780 0Z"/>
    </clipPath>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity=".55"/>
    </filter>
  </defs>

  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#darkFade)"/>

  <g opacity=".2">
    <path class="line-a" d="M0 75C280 18 514 23 750 73C1002 126 1222 124 1500 64" stroke="#FF6B6B" stroke-width="3"/>
    <path class="line-b" d="M0 118C265 68 503 70 782 128C1048 184 1260 170 1500 105" stroke="#FFFFFF" stroke-width="2"/>
    <path class="line-a" d="M0 162C276 111 533 112 806 171C1054 225 1262 210 1500 151" stroke="#FF2D2D" stroke-width="3"/>
    <path class="line-b" d="M0 210C300 156 565 159 842 220C1082 272 1280 255 1500 199" stroke="#FFFFFF" stroke-width="1.5"/>
    <path class="line-a" d="M0 258C302 207 575 207 865 268C1105 318 1295 305 1500 250" stroke="#FF2D2D" stroke-width="3"/>
  </g>

  <rect class="scan" x="0" y="0" width="220" height="500" fill="#FFFFFF" opacity=".08"/>

  <g clip-path="url(#rightPhoto)" filter="url(#shadow)">
    <image class="photo" href="kakashi.png" x="740" y="-72" width="730" height="650" preserveAspectRatio="xMidYMid slice"/>
    <rect x="675" y="0" width="825" height="500" fill="url(#darkFade)" opacity=".35"/>
    <rect x="650" y="0" width="850" height="500" fill="#FF0000" opacity=".14"/>
  </g>

  <path d="M0 116H790L715 190H0V116Z" fill="url(#whiteSlash)"/>
  <text x="120" y="166" fill="#F40000" font-family="Segoe UI, Arial, sans-serif" font-size="43" font-weight="900" letter-spacing="1">PROFILE DEVELOPER</text>

  <g class="name-wagner">
    <text x="118" y="283" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="74" font-weight="900">Wagner Silva</text>
    <text x="122" y="322" fill="#FFEAEA" font-family="Consolas, monospace" font-size="24" font-weight="700">JavaScript Developer | FiveM vRP | Discord Bots</text>
  </g>

  <g class="name-kakashi">
    <text x="118" y="283" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="78" font-weight="900">Sr. Kakashi</text>
    <text x="122" y="322" fill="#FFEAEA" font-family="Consolas, monospace" font-size="24" font-weight="700">Automation | APIs | Optimized Systems</text>
    <path class="pulse" d="M118 340H585" stroke="#FF1D1D" stroke-width="7" stroke-linecap="round"/>
  </g>

  <g>
    <rect x="118" y="365" width="250" height="56" rx="10" fill="#111111" fill-opacity=".32" stroke="#FFFFFF" stroke-opacity=".78"/>
    <text x="150" y="402" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="800">GitHub Profile</text>
    <rect x="390" y="365" width="315" height="56" rx="10" fill="#FF0000"/>
    <text x="425" y="402" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="900">Systems & Automation</text>
  </g>

  <rect x="0" y="0" width="1500" height="500" fill="none" stroke="#30363D"/>
  <rect x="0" y="455" width="1500" height="45" fill="url(#darkFade)" opacity=".8"/>
</svg>

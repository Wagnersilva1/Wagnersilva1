name: 3D Contribution Graph

on:
  schedule:
    - cron: "35 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  profile-3d:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          USERNAME: Wagnersilva1

      - name: Add perspective labels to 3D graph
        run: node scripts/add-3d-graph-labels.mjs

      - name: Commit 3D contribution graph
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update 3D contribution graph"
          file_pattern: profile-3d-contrib/*.svg

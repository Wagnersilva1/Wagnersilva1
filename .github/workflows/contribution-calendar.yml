name: Contribution Calendar

on:
  schedule:
    - cron: "45 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  contribution-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate contribution calendar
        run: node scripts/generate-contribution-calendar.mjs
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GITHUB_USERNAME: Wagnersilva1

      - name: Commit contribution calendar
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update contribution calendar"
          file_pattern: contribution-calendar.svg
